name: Deploy Spring Boot App

on:
  push:
    branches:
      - develop   # deploy when pushing to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Copy project files to VM
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/app

      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/app
            docker-compose down
            docker-compose up -d --build
          EOF
