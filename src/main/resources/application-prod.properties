# --- Spring Application Name for Production ---
spring.application.name=ecommerce-backend-prod

# --- PostgreSQL Database Configuration for Production (Examples - DO NOT PUT ACTUAL CREDENTIALS HERE) ---
# In real production, these values are usually injected via environment variables or a secret management service
# spring.datasource.url=jdbc:postgresql://prod-db-host:5432/ecommerce_prod_db
# spring.datasource.username=prod_db_user
# spring.datasource.password=${DB_PASSWORD} # Use environment variable for sensitive info
# spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate Configuration for Production ---
# Use 'validate' or 'none' for production and manage schema migrations with Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- JWT Configuration for Production (Examples - DO NOT PUT ACTUAL SECRET HERE) ---
# jwt.secret=${JWT_SECRET_KEY} # Use environment variable for sensitive info
# jwt.expirationMs=3600000 # 1 hour, typically shorter for production access tokens

# --- Server Port for Production (e.g., standard HTTP port) ---
server.port=8080
# Or 443 if using HTTPS directly

