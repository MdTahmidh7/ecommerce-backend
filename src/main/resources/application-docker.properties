# File: ecommerce-backend/src/main/resources/application-docker.properties
# This file is loaded when the 'docker' Spring profile is active.
# Values are resolved from environment variables provided by Docker Compose.

# --- Database Configuration ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://db:5432/ecommerce_db
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Spring Mail Sender Configuration ---
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# --- OTP Module Configuration ---
otp.validity.minutes=${OTP_VALIDITY_MINUTES}
otp.resend.cooldown.seconds=${OTP_RESEND_COOLDOWN_SECONDS}

# --- Springdoc OpenAPI (Swagger) Configuration ---
springdoc.packages-to-scan=com.ecommerce.eshop

# --- JWT Configuration ---
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS}

# --- MinIO Configuration ---
minio.endpoint=${MINIO_ENDPOINT:http://20.55.108.20:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket-name=${MINIO_BUCKET_NAME:ecommerce-products}

# --- Timezone Configuration ---
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- RabbitMQ Configuration ---
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# --- File Upload Configuration ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.cors.allowed-origins=http://localhost:4200,http://20.55.108.20

# --- BulkSMS Configuration ---
bulksms.api-key=YOUR_API_KEY
bulksms.sender-id=YOUR_SENDER_ID
otp.service.enabled=false
default.otp=123456

