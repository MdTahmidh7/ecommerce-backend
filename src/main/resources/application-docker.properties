# File: ecommerce-backend/src/main/resources/application-docker.properties
# This file is loaded when the 'docker' Spring profile is active.
# Values are resolved from environment variables provided by Docker Compose.

# --- Database Configuration ---
# The hostname 'db' resolves to the PostgreSQL container within the Docker network.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://db:5432/ecommerce_db
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Spring Mail Sender Configuration ---
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# spring.mail.properties.mail.debug=true # Uncomment this line temporarily for debugging if needed

# --- OTP Module Configuration ---
otp.validity.minutes=${OTP_VALIDITY_MINUTES}
otp.resend.cooldown.seconds=${OTP_RESEND_COOLDOWN_SECONDS}

# --- Springdoc OpenAPI (Swagger) Configuration ---
springdoc.packages-to-scan=com.ecommerce.eshop

# --- JWT Configuration ---
#jwt.secret=${JWT_SECRET}
#jwt.expirationMs=${JWT_EXPIRATIONMS}
