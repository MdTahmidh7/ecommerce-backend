version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16.3-alpine
    container_name: ecommerce_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: eshop_user
      POSTGRES_PASSWORD: eshop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ecommerce_minio
    restart: always
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console UI port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Spring Boot Backend
  backend:
    image: ${DOCKER_HUB_USERNAME}/ecommerce-backend:latest
    container_name: ecommerce_backend_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: eshop_user
      SPRING_DATASOURCE_PASSWORD: eshop_password

      # MinIO Configuration
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_NAME: ecommerce-products

      # Mail Configuration
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your.email@gmail.com
      SPRING_MAIL_PASSWORD: your_app_password
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"

      # OTP Configuration
      OTP_VALIDITY_MINUTES: 5
      OTP_RESEND_COOLDOWN_SECONDS: 60

      # JWT Configuration
      JWT_SECRET: SUxvdmVCYW5nbGFkZXNoSXRJc0FCZWF1dGlmdWxsQ291bnRyeQ==
      JWT_EXPIRATION_MS: 3600000

      # Spring Profile
      SPRING_PROFILES_ACTIVE: docker

    depends_on:
      - db
      - minio
    networks:
      - ecommerce_network

# Named volumes for data persistence
volumes:
  postgres_data:
  minio_data:

# Custom network
networks:
  ecommerce_network:
    driver: bridge
