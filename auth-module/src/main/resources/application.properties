spring.application.name=auth-module

# auth-module/src/test/resources/application.properties

# --- JWT Configuration for Tests ---
# Use a simple, non-sensitive secret for tests.
jwt.secret=VGFobWlkSXNUaGVCZXN0
jwt.expirationMs=3600000

# --- H2 Database Configuration for Tests (Highly Recommended) ---
# It's generally best practice to use an in-memory database like H2 for tests.
# This avoids needing a running PostgreSQL instance for every test run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate Configuration for Tests ---
# 'create-drop' is suitable for tests: creates schema, drops after tests.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
